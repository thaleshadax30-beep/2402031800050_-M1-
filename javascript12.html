<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String object</title>
</head>
<body>
    <script>
        var A = "This is a string";
        var B ="Dax"
        document.write(A.charAt(5));
        document.write("<br>");

        document.write(A.concat(B));
        document.write("<br>");

        document.write(A.indexOf("o"));
        document.write("<br>");

        document.write(A.lastIndexOf("o"));
        document.write("<br>");

        document.write(A.length);
        document.write("<br>");

        document.write(A.slice(0,5));
        document.write("<br>");

        document.write(A.toUpperCase());
        document.write("<br>");

        document.write(A.toLowerCase());
        document.write("<br>");

        document.write(A.split(" "));
        document.write("<br>");

        document.write(A.replace("Dax", "this"));
        document.write("<br>");
    </script>
    
</body>
</html>
