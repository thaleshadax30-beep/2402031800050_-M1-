<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Contact Royal Tours & Travels – Submit a travel inquiry for France, Spain, USA, Italy, Japan, Sri Lanka or Morocco tours." />
  <title>🛂 Contact | Royal Tours & Travels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Contac.css">
</head>

<body>

  <nav>
    <a href="index.html" id="nav-home">🏠 Home</a>
    <a href="about.html" id="nav-about">🤲 About Us</a>
    <a href="contact.html" class="active" id="nav-contact">🛂 Contact</a>
  </nav>

  <!-- Success Toast -->
  <div id="success-toast" class="toast" role="alert" aria-live="polite">
    ✅ Inquiry submitted! We'll contact you within 24 hours.
  </div>

  <!-- Travel Inquiry Form -->
  <section class="form-section">
    <div class="form-container">
      <h2>✈️ Travel Inquiry Form</h2>

      <form id="inquiry-form" novalidate>

        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="gender" value="Male" required> Male
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="Female"> Female
            </label>
            <label class="radio-label">
              <input type="radio" name="gender" value="Other"> Other
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="service">Select Destination</label>
          <select id="service" name="service" required>
            <option value="None">— Select your destination —</option>
            <option value="France">🇫🇷 France</option>
            <option value="Spain">🇪🇸 Spain</option>
            <option value="United States">🇺🇸 United States</option>
            <option value="Italy">🇮🇹 Italy</option>
            <option value="Japan">🇯🇵 Japan</option>
            <option value="Sri Lanka">🇱🇰 Sri Lanka</option>
            <option value="Morocco">🇲🇦 Morocco</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us about your travel plans, group size, budget, etc."
            required></textarea>
        </div>

        <div class="button-group">
          <button type="submit" id="submit-btn">🚀 Submit Inquiry</button>
          <input type="reset" id="reset-btn" value="🔄 Reset">
        </div>

        <p id="form-error" class="form-error" aria-live="polite"></p>

      </form>
    </div>
  </section>

  <!-- Contact Info -->
  <section class="contact-info">
    <h2>📬 Get In Touch</h2>
    <div class="info-grid">
      <div class="info-item">📞 <span>9081584475</span></div>
      <div class="info-item">📧 <span>romildobariya79@gmail.com</span></div>
      <div class="info-item">🕐 <span>We respond within 24 hours</span></div>
      <div class="info-item">🛎️ <span>24 / 7 Available Service</span></div>
    </div>


  </section>

  <section class="footer">
    <p>© 2026 Royal Tours &amp; Travels | All Rights Reserved</p>
  </section>

  <!-- JavaScript: Form Validation + Toast -->
  <script>
    const form = document.getElementById('inquiry-form');
    const toast = document.getElementById('success-toast');
    const formError = document.getElementById('form-error');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      formError.textContent = '';

      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const gender = document.querySelector('input[name="gender"]:checked');
      const destination = document.getElementById('service').value;
      const message = document.getElementById('message').value.trim();

      // Validate name
      if (name.length < 2) {
        formError.textContent = '⚠️ Please enter your full name.';
        return;
      }

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        formError.textContent = '⚠️ Please enter a valid email address.';
        return;
      }

      // Validate mobile (10 digits)
      if (!/^[0-9]{10}$/.test(mobile)) {
        formError.textContent = '⚠️ Mobile number must be exactly 10 digits.';
        return;
      }

      // Validate gender
      if (!gender) {
        formError.textContent = '⚠️ Please select your gender.';
        return;
      }

      // Validate destination
      if (destination === 'None') {
        formError.textContent = '⚠️ Please select a destination.';
        return;
      }

      // Validate message
      if (message.length < 10) {
        formError.textContent = '⚠️ Please write a short message (at least 10 characters).';
        return;
      }

      // All valid — show toast & reset form
      form.reset();
      showToast();
    });

    function showToast() {
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4500);
    }
  </script>

</body>

</html>
