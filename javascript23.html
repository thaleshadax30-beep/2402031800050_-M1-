<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom get elementbyname</title>
</head>
<body>
    <input type="text" id="my text">
    <button onclick="myFunction()">Click</button>
    <script>
        function myFunction()
        {
            a = document.getElementsByName("my text")[0];
            alert(a.value);

        }

    </script>




    
</body>
</html>
