<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" cellspacing="2" height="250" width="600" align="center" style="background-color: green; color: white;">
        <tr align="Center">
            <td colspan="8"><h2>Registration Form</h2></td>
        </tr>
        <tr align="Center">
            <td colspan="3">First Name:</td>
            <td colspan="5"><input type="text" placeholder="Enter your first name"></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Last Name:</td>
            <td colspan="5"><input type="text" placeholder="Enter your last name"></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Email:</td>
            <td colspan="5"><input type="email" placeholder="Enter your email"></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Password:</td>
            <td colspan="5"><input type="password" placeholder="Enter your password"></td>
        </tr>
            <tr align="Center">
            <td colspan="3">Gender:</td>
            <td colspan="5">
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female">  Female
            </td>
        </tr>
        <tr align="Center">
            <td colspan="3">Hobbies:</td>
            <td colspan="5">
                <input type="checkbox" name="hobby" value="playing"> Playing
                <input type="checkbox" name="hobby" value="traveling"> Traveling
                <input type="checkbox" name="hobby" value="running"> Running
            </td>
        </tr>
        <tr align="Center">
            <td colspan="3">City:</td>
            <td colspan="5">
                <select>
                    <option value="Rajkot">Rajkot</option>
                    <option value="Amreli">Amreli</option>
                    <option value="Ahemedabad">Ahemedabad</option>
                    <option value="Surat">Surat</option>
                </select>
            </td>
        </tr>
        <tr align="Center">
            <td colspan="3">Contact:</td>
            <td colspan="5"><input type="text" placeholder="Enter your contact number"></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Address:</td>
            <td colspan="5"><textarea placeholder="Enter Your Address"></textarea></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Date of birth:</td>
            <td colspan="5"><input type="date"></td>
        </tr>
        <tr align="Center">
            <td colspan="3">Confirm your Form:</td>
            <td colspan="3"><input type="submit" value="Submit"></td>
            <td colspan="2"><input type="reset" value="Reset"></td>
        </tr>
    </table>
</body>
</html>
