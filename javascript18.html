<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>math function </title>
</head>
<body>
    <script>
        document.writeln(Math.E)

        var a = Math.pow(2,3);
        document.write(a);
        document.write("<br>");

        var num  =Math.random();
        document.write(num);
        document.write("<br>");

        var num2 = parseInt( 1 + (Math.random() * 100));
        document.write(num2);
        document.write("<br>");

        document.write(Math.ceil(2.7));
        document.write("<br>");
        document.write(Math.floor(2.7));
        document.write("<br>");
        document.write(Math.round(2.7));
        document.write("<br>");


    </script>
    
    
</body>
</html>
