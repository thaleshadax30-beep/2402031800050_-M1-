<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown timer</title>
</head>
<body>
    <h1>Countdown timer</h1>
    <script>
        var count = 10;
        document.write("Countdown: " + count);
        document.write("<br>");
        for(var i = count - 1; i >= 0; i--){
            document.write("Countdown: " + i);
            document.write("<br>");
        }
    </script>
</body>
</html>
