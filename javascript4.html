<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Changing a data type </title>

</head>
<body>
    <script>
        var a = 10;
        var b = true;
        var c = "Hello world !"
        var x =  {
            name: "Dax",
            age:20
        };
        var y =["red", "green","yellow"]


        document.write(typeof a)
        document.write("<br>"+a)
        document.write(typeof b)
        document.write("<br>"+b)
        document.write(typeof c)
        document.write("<br>"+c)
        document.write(typeof x)
        document.write("<br>"+x)
        document.write(+typeof y)
        document.write("<br>"+y)

    </script>
    
</body>
</html>
