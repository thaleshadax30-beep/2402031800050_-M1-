<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS float</title>
    <style>
        #division1{
            background-color: red;
            float: left;
            width: 40%;
            font-size: large;
            height: 50px;
        }
        #division2{
            background-color: blueviolet;
            float: right;
            width: 40%;
            font-size: large;
            height: 50px;
        }
    </style>
</head>
<body>
    <div id="division1">
        ABC Content
    </div>
    <div id="division2">
        XYZ Content
    </div>
    
</body>
</html>
