<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating object using a literal Notation</title>
</head>
<body>
    <script>
        var person = { firstName: "Dax",lastName: "Thalesa",
    sayHi : function()
    {
        alert("Hi!" + person.firstName + " " + person.lastName);

    }
};
person.sayHi();
    </script>
    
</body>
</html>
