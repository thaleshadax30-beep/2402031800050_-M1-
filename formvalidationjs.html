<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation Example</title>
</head>

<body>

<script>
function validate() {

    var form = document.forms["RegForm"];

    var name = form["Name"].value;
    var email = form["Email"].value;
    var phone = form["Telephone"].value;
    var what = form["Subject"];
    var password = form["Password"].value;

    var regEmail = /^\w+([.-]?\w+)*@\w+([.-]?\w+)*(\.\w{2,3})+$/;
    var regPhone = /^\d{10}$/;

    
    if (name == "") {
        alert("Please enter your Name");
        return false;
    }

    
    else if (email == "" || !regEmail.test(email)) {
        alert("Please enter a valid E-mail address");
        return false;
    }

    
    else if (password == "") {
        alert("Please enter your Password");
        return false;
    }

    else if (password.length < 6) {
        alert("Password should be at least 6 characters long");
        return false;
    }

    
    else if (phone == "" || !regPhone.test(phone)) {
        alert("Please enter a valid mobile number");
        return false;
    }

    
    else if (what.selectedIndex == 0) {
        alert("Please select your course");
        return false;
    }

    alert("Form Submitted Successfully!");
    return true;
}
</script>

<form name="RegForm" method="post" id="RegForm" onsubmit="return validate()">

<table border="1" cellpadding="10">

    <tr>
        <td colspan="2">
            <h1 style="text-align:center;">REGISTRATION FORM</h1>
        </td>
    </tr>

    <tr>
        <td>Name :</td>
        <td>
            <input type="text" size="40" name="Name">
        </td>
    </tr>

    <tr>
        <td>E-mail Address :</td>
        <td>
            <input type="text" size="40" name="Email">
        </td>
    </tr>

    <tr>
        <td>Password :</td>
        <td>
            <input type="password" size="40" name="Password">
        </td>
    </tr>

    <tr>
        <td>Mobile :</td>
        <td>
            <input type="text" size="40" name="Telephone">
        </td>
    </tr>

    <tr>
        <td>Select your course :</td>
        <td>
            <select name="Subject">
                <option value="">--Select Course--</option>
                <option>B.Tech</option>
                <option>M.Tech</option>
                <option>BCA</option>
                <option>MCA</option>
            </select>
        </td>
    </tr>

    <tr>
        <td>Comments :</td>
        <td>
            <textarea cols="40" name="Comments"></textarea>
        </td>
    </tr>

    <tr>
        <td></td>
        <td>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </td>
    </tr>

</table>

</form>

</body>
</html>
