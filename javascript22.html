<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom example</title>
</head>
<body>
    <input type="text" id="my text">
    <button onclick="myFunction()">Click</button>


    <script>
        function myFunction()
        {
            var txt = document.getElementById("my text");
            alert(txt.value);

        }

    </script>
    
</body>
</html>
