<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Events</title>
    <style>
        body{ font-family: Arial}
        #box {
            background-color: lightskyblue;
            padding: 10px;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <h1> Welcome boys : learn Mouse event</h1>
    
    <div id="box" class="test">
        <h2>Test box</h2>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Excepturi molestiae fuga odio delectus nisi minus. Adipisci tenetur unde consequuntur incidunt impedit amet commodi, quis tempore dolores esse, aliquid atque nesciunt!</p>

    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.slim.js" integrity="sha256-UgvvN8vBkgO0luPSUl2s8TIlOSYRoGFAX4jlCIm9Adc=" crossorigin="anonymous"></script>
    <script>
        $(document).ready(function(){
            $('#box').click(function(){
                $('#box').css('background-color','pink')
               //var a = $('#box').html();
               //console.log(a);


            });
            $('#box').dblclick(function(){
                $('#box').css('background-color','red')

            })
            $('#box').contextmenu(function(){
                $('#box').css('background-color','yellow')

            })
            $('#box').mouseenter(function(){
                $('#box').css('background-color','purple')

            })

            $('#box').mouseleave(function(){
                $('#box').css('background-color','orange')

            })
        });
    </script>
</body> 
</html>
