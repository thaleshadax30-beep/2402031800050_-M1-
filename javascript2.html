<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable declaration</title>
</head>
<body>
    <h2>Javascript variable</h2>
    <p>In this example x,y,z variable
    </p>
    <p id="Demo"></p>
    <p id="Demo1"></p>
    <p id="Demo2"></p>
    <p id="Demo3"></p>
    <script>
        var x = 20;
        var y = 10;
        var z = x+y;
        var a = x-y;
        var b = x*y;
        var c = x/y;
        document.getElementById("Demo").innerHTML="value of z is:"+z;
        document.getElementById("Demo1").innerHTML="value of a is:"+a;
        document.getElementById("Demo2").innerHTML="value of b is:"+b;
        document.getElementById("Demo3").innerHTML="value of c is:"+c;


        
    </script>
    
</body>
</html>
