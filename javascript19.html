<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date objects</title>
</head>
<body>
    <p id="Demo"></p>
    <p id="Demo1"></p>

    <script>
        const d = new Date();
        document.getElementById("Demo").innerHTML = d;
        document.write("<br>");

        const d1 = new Date(2024,6,30,10,10,56,0);
        document.getElementById("Demo1").innerHTML = d1;
    </script>
</body>
</html>
