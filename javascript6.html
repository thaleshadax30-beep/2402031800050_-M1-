<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>find positive or negetive number</title>
</head>
<body>
    <script>
        Number = prompt("Enter a number:")
        if(Number>0) {
            document.write("This number is postive")
        }
        else {
            document.write("This number is negetive")
        }
    </script>
    
</body>
</html>
