<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS positions</title>
</head>
<style>
    body{
    height: 1000px;
    width: 2000px;
}
h1 {
    position: absolute;
    padding: auto;
    background-color: aqua;
    left: 50px;
    top: 100px;
}
h2 {
    position: relative;
    padding: auto;
    background-color: blue;
    left: 50px;
    top: 100px;
}
h3{
    position: fixed;
    padding: auto;
    background-color: blueviolet;
    left:  50px;
    top: 100px;
}

</style>
<body>
    <div class="box1">
    <h1> absolute positions</h1></div>
    <div class="box2">
    <h2>  static positions</h2></div>
    <div class="box3">
    <h3>  fixed positions</h3></div>
    
</body>
</html>
